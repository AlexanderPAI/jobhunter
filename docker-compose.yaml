services:

  backend:
    container_name: backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose:
      - "8080"
    volumes:
      - ./backend/storage:/app/backend/storage:rw
    env_file:
      - .env
    environment:
      JWT_SECRET: ${JWT_SECRET:?Add JWT_SECRET with at least 32 characters to .env}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-480}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - public
      - frontend_backend
      - backend_db

  db:
    container_name: hunter_ps
    image: postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data:rw
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend_db

  frontend:
    container_name: frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_started
    networks:
      - public
      - frontend_backend

volumes:
  postgres_data:

networks:
  public:
  frontend_backend:
    internal: true
  backend_db:
    internal: true
